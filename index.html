<!DOCTYPE html>
<html>
<head><title>Cyber Shield Portal</title></head>
<body style="font-family: Arial; padding: 40px; background: #eef2f3;">
    <div style="background: white; padding: 20px; border-radius: 8px; border-top: 5px solid #2c3e50;">
        <h2>🛡️ Cyber Incident Reporting Portal</h2>
        <form action="/report" method="POST">
            <input type="text" name="u_name" placeholder="Your Name" required style="width:100%; margin-bottom:10px; padding:8px;"><br>
            <select name="u_type" style="width:100%; margin-bottom:10px; padding:8px;">
                <option value="Phishing">Phishing Attack</option>
                <option value="Identity Theft">Identity Theft</option>
                <option value="Malware">Malware / Ransomware</option>
            </select><br>
            <textarea name="u_msg" placeholder="Describe the threat..." required style="width:100%; height:80px; margin-bottom:10px; padding:8px;"></textarea><br>
            <button type="submit" style="background:#2c3e50; color:white; padding:10px 20px; border:none; cursor:pointer;">Register Secure Complaint</button>
        </form>
    </div>
</body>
</html>
